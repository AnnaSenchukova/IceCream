<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelatelier — Конструктор мороженого</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <header class="page__header">
      <div class="container header__inner">
        <a class="header__logo logo" href="#" aria-label="Gelatelier — на главную">
          <svg class="logo__mark" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true" focusable="false">
            <path class="logo__mark-path" d="M20 4c5.5 0 10 4.4 10 9.8 0 1.6-.4 3.1-1.1 4.5H11.1A9.7 9.7 0 0 1 10 13.8C10 8.4 14.5 4 20 4Z" fill="currentColor"/>
            <path class="logo__mark-cone" d="M11.6 19.6h16.8L20 37 11.6 19.6Z" fill="currentColor" opacity="0.55"/>
          </svg>
          <span class="logo__text">Gelatelier</span>
        </a>
        <button class="header__cart cart" type="button" aria-label="Корзина">
          <svg class="cart__icon" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true" focusable="false">
            <path class="cart__icon-path" d="M3 4h3l2.6 13.2a2 2 0 0 0 2 1.6h9.2a2 2 0 0 0 2-1.5L25 8H7.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle class="cart__icon-wheel" cx="11" cy="23.5" r="1.8" fill="currentColor"/>
            <circle class="cart__icon-wheel" cx="20" cy="23.5" r="1.8" fill="currentColor"/>
          </svg>
          <span class="cart__count" data-cart-count>0</span>
        </button>
      </div>
    </header>

    <main class="page__main">
      <section class="page__intro intro">
        <div class="container">
          <h1 class="intro__title">Мороженое<br>на твой вкус</h1>
          <p class="intro__text">Собери собственный рожок из трёх шариков. Шесть авторских вкусов, выверенный баланс и чистая текстура в каждой порции.</p>
        </div>
      </section>

      <section class="page__section catalog" aria-labelledby="catalog-title">
        <h2 class="visually-hidden" id="catalog-title">Конструктор и каталог вкусов</h2>
        <div class="container catalog__inner">

          <div class="catalog__builder builder" data-builder>
            <div class="builder__head">
              <span class="builder__title-pill">Твой рожок</span>
              <span class="builder__price" data-builder-price>0 ₽</span>
            </div>
            <div class="builder__visual" data-builder-visual>
              <ul class="builder__slots" data-slots>
                <li class="builder__slot builder__slot--empty" data-slot="0"></li>
                <li class="builder__slot builder__slot--empty" data-slot="1"></li>
                <li class="builder__slot builder__slot--empty" data-slot="2"></li>
              </ul>
              <picture class="builder__cone-mockup">
                <source type="image/webp" srcset="img/cone@1x.webp 1x, img/cone@2x.webp 2x">
                <source type="image/png" srcset="img/cone@1x.png 1x, img/cone@2x.png 2x">
                <img class="builder__cone-img" src="img/cone@1x.png" alt="Вафельный рожок" width="220" height="320">
              </picture>
            </div>
            <p class="builder__status" data-status>Выбери 3 шарика</p>
            <noscript>
              <p class="builder__noscript">Для сборки рожка включите JavaScript. Каталог вкусов и цены доступны ниже.</p>
            </noscript>
            <button class="builder__button builder__button--disabled" type="button" data-add disabled>Собери мороженое</button>
          </div>

          <div class="catalog__panel">
            <span class="catalog__pill">Собери мороженое</span>
            <ul class="catalog__list" data-flavors>

              <li class="catalog__card card" data-flavor="vanilla" data-name="Ваниль Бурбон" data-price="180" data-color="#ecdcc0">
                <button class="card__button" type="button" aria-label="Добавить шарик: Ваниль Бурбон, 180 рублей">
                  <span class="card__visual" style="--card-color:#ecdcc0">
                    <picture class="card__media">
                      <source type="image/webp" srcset="img/ice-cream-vanilla@1x.webp 1x, img/ice-cream-vanilla@2x.webp 2x">
                      <source type="image/png" srcset="img/ice-cream-vanilla@1x.png 1x, img/ice-cream-vanilla@2x.png 2x">
                      <img class="card__img" src="img/ice-cream-vanilla@1x.png" alt="" width="267" height="267" loading="lazy">
                    </picture>
                    <span class="card__price">180 ₽</span>
                  </span>
                  <span class="card__title">Ваниль Бурбон</span>
                </button>
              </li>

              <li class="catalog__card card" data-flavor="pistachio" data-name="Фисташка" data-price="240" data-color="#bcc89a">
                <button class="card__button" type="button" aria-label="Добавить шарик: Фисташка, 240 рублей">
                  <span class="card__visual" style="--card-color:#bcc89a">
                    <span class="card__badge">HIT</span>
                    <picture class="card__media">
                      <source type="image/webp" srcset="img/ice-cream-pistachio@1x.webp 1x, img/ice-cream-pistachio@2x.webp 2x">
                      <source type="image/png" srcset="img/ice-cream-pistachio@1x.png 1x, img/ice-cream-pistachio@2x.png 2x">
                      <img class="card__img" src="img/ice-cream-pistachio@1x.png" alt="" width="267" height="267" loading="lazy">
                    </picture>
                    <span class="card__price">240 ₽</span>
                  </span>
                  <span class="card__title">Фисташка</span>
                </button>
              </li>

              <li class="catalog__card card" data-flavor="strawberry" data-name="Клубника" data-price="210" data-color="#e3a9a4">
                <button class="card__button" type="button" aria-label="Добавить шарик: Клубника, 210 рублей">
                  <span class="card__visual" style="--card-color:#e3a9a4">
                    <picture class="card__media">
                      <source type="image/webp" srcset="img/ice-cream-strawberry@1x.webp 1x, img/ice-cream-strawberry@2x.webp 2x">
                      <source type="image/png" srcset="img/ice-cream-strawberry@1x.png 1x, img/ice-cream-strawberry@2x.png 2x">
                      <img class="card__img" src="img/ice-cream-strawberry@1x.png" alt="" width="267" height="267" loading="lazy">
                    </picture>
                    <span class="card__price">210 ₽</span>
                  </span>
                  <span class="card__title">Клубника</span>
                </button>
              </li>

              <li class="catalog__card card" data-flavor="chocolate" data-name="Тёмный шоколад" data-price="230" data-color="#9c6b52">
                <button class="card__button" type="button" aria-label="Добавить шарик: Тёмный шоколад, 230 рублей">
                  <span class="card__visual" style="--card-color:#9c6b52">
                    <span class="card__badge">NEW</span>
                    <picture class="card__media">
                      <source type="image/webp" srcset="img/ice-cream-chocolate@1x.webp 1x, img/ice-cream-chocolate@2x.webp 2x">
                      <source type="image/png" srcset="img/ice-cream-chocolate@1x.png 1x, img/ice-cream-chocolate@2x.png 2x">
                      <img class="card__img" src="img/ice-cream-chocolate@1x.png" alt="" width="267" height="267" loading="lazy">
                    </picture>
                    <span class="card__price">230 ₽</span>
                  </span>
                  <span class="card__title">Тёмный шоколад</span>
                </button>
              </li>

              <li class="catalog__card card" data-flavor="matcha" data-name="Матча" data-price="250" data-color="#a7bf91">
                <button class="card__button" type="button" aria-label="Добавить шарик: Матча, 250 рублей">
                  <span class="card__visual" style="--card-color:#a7bf91">
                    <picture class="card__media">
                      <source type="image/webp" srcset="img/ice-cream-matcha@1x.webp 1x, img/ice-cream-matcha@2x.webp 2x">
                      <source type="image/png" srcset="img/ice-cream-matcha@1x.png 1x, img/ice-cream-matcha@2x.png 2x">
                      <img class="card__img" src="img/ice-cream-matcha@1x.png" alt="" width="267" height="267" loading="lazy">
                    </picture>
                    <span class="card__price">250 ₽</span>
                  </span>
                  <span class="card__title">Матча</span>
                </button>
              </li>

              <li class="catalog__card card" data-flavor="caramel" data-name="Солёная карамель" data-price="220" data-color="#d8a86a">
                <button class="card__button" type="button" aria-label="Добавить шарик: Солёная карамель, 220 рублей">
                  <span class="card__visual" style="--card-color:#d8a86a">
                    <span class="card__badge">HIT</span>
                    <picture class="card__media">
                      <source type="image/webp" srcset="img/ice-cream-caramel@1x.webp 1x, img/ice-cream-caramel@2x.webp 2x">
                      <source type="image/png" srcset="img/ice-cream-caramel@1x.png 1x, img/ice-cream-caramel@2x.png 2x">
                      <img class="card__img" src="img/ice-cream-caramel@1x.png" alt="" width="267" height="267" loading="lazy">
                    </picture>
                    <span class="card__price">220 ₽</span>
                  </span>
                  <span class="card__title">Солёная карамель</span>
                </button>
              </li>

            </ul>
          </div>

        </div>
      </section>
    </main>

    <footer class="page__footer footer">
      <div class="container footer__inner">
        <span class="footer__text">© 2026 Gelatelier. Сделано с любовью к текстуре.</span>
      </div>
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
